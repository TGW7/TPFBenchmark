    <meta property="og:type" content="website" />

  <body>
    <div id="root">
      <!-- Crawler / no-JS fallback so the page isn't an empty shell. -->
      <noscript>
        <main style="max-width: 640px; margin: 48px auto; padding: 0 20px; font-family: system-ui, sans-serif;">
          <h1>Know if your training is actually working.</h1>
          <p>Take Point Fitness is a free benchmark for lifters and hybrid athletes.

            <a href="https://app.takepointfitness.com">app.takepointfitness.com</a>.</p>
        </main>

    </div>
    <script type="module" src="/src/main.tsx"></script>
